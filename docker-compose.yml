version: "3.9"

services:

  web:
    build: .
    container_name: barber-web
    ports:
     - "3001:3000"
     - "5566:5555"   # Porta do Prisma Studio

    volumes:
      - .:/app              # espelha o projeto no container
      - /app/node_modules   # isola node_modules dentro do container
    stdin_open: true
    tty: true

  studio:
    image: node:20
    container_name: barber-studio
    working_dir: /app/app
    command: sh -c "npm install prisma @prisma/client && npx prisma studio --port 5555 --browser none --url=$DATABASE_URL"
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/barber?schema=public"
    volumes:
      - .:/app
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: barber-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: barber
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
